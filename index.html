<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>顧客登録</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="status">読み込み中...</p>
  <script>
    const LIFF_ID = "2010311436-J8hmoIjg";
    const FORM_BASE = "https://docs.google.com/forms/d/e/1FAIpQLSe2czICE3Sccuf1ju-nuvC0RtPBRdEsH3IkMT7cjulOaOjarw/viewform";
    const ENTRY_ID = "entry.293310303";
    
    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        
        const profile = await liff.getProfile();
        const url = FORM_BASE + "?usp=pp_url&" + ENTRY_ID + "=" + profile.userId;
        location.href = url;
      } catch (error) {
        document.getElementById("status").textContent = "エラー: " + error.message;
      }
    }
    
    main();
  </script>
</body>
</html>
