<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>マイカルテ</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #ffe6f0 0%, #fff5e6 50%, #e6f7ff 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 30px 25px;
      box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
    }
    h2 {
      text-align: center;
      color: #d87093;
      margin: 0 0 25px;
      font-size: 24px;
      letter-spacing: 0.1em;
    }
    .card {
      background: linear-gradient(135deg, #fff9fc 0%, #fff5e6 100%);
      border: 2px solid #ffd6e8;
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .card-date {
      color: #d87093;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .card-menu {
      color: #8b6f8b;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .card-comment {
      color: #666;
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .empty {
      text-align: center;
      color: #b89eb8;
      padding: 40px 0;
    }
    #loading {
      text-align: center;
      color: #b89eb8;
      padding: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>✿ マイカルテ ✿</h2>
    <div id="loading">読み込み中...</div>
    <div id="list"></div>
  </div>
  
  <script>
    const LIFF_ID = "ここにマイカルテ用のLIFF_IDを入れる";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuHhCk-GWd78NW_m-KdsFve-6KxLETUCs_TbLhPzHblu2vxyyE7kWaawYDw80tabbuOA/exec";
    
    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        
        const profile = await liff.getProfile();
        const userId = profile.userId;
        
        const res = await fetch(GAS_URL + "?action=getKarte&userId=" + userId);
        const data = await res.json();
        
        document.getElementById("loading").style.display = "none";
        const list = document.getElementById("list");
        
        if (data.length === 0) {
          list.innerHTML = '<div class="empty">まだ記録がありません。</div>';
          return;
        }
        
        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = 
            '<div class="card-date">' + item.date + '</div>' +
            '<div class="card-menu">' + item.menu + '</div>' +
            (item.comment ? '<div class="card-comment">' + item.comment + '</div>' : '');
          list.appendChild(card);
        });
      } catch (error) {
        document.getElementById("loading").textContent = "エラー: " + error.message;
      }
    }
    
    main();
  </script>
</body>
</html>
